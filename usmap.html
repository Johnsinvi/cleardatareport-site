<div class="hero">
  <h1>US Median Household Income by State</h1>

<div class="card">
  <div id="map"></div>

<script>
// ACS 2022 median household income + most common occupation by state
const states = [
  ['AL','Alabama',52035,'Retail Salesperson'],['AK','Alaska',77640,'Driver/Sales Worker'],
  ['AZ','Arizona',65913,'Retail Salesperson'],['AR','Arkansas',50540,'Driver/Sales Worker'],

  ['CT','Connecticut',83771,'Registered Nurse'],['DE','Delaware',72724,'Retail Salesperson'],
  ['FL','Florida',59227,'Retail Salesperson'],['GA','Georgia',65030,'Retail Salesperson'],
  ['HI','Hawaii',83102,'Retail Salesperson'],['ID','Idaho',62992,'Retail Salesperson'],
  ['IL','Illinois',72205,'Retail Salesperson'],['IN','Indiana',60054,'Driver/Sales Worker'],
  ['IA','Iowa',64498,'Driver/Sales Worker'],['KS','Kansas',63001,'Retail Salesperson'],
  ['KY','Kentucky',55454,'Driver/Sales Worker'],['LA','Louisiana',54216,'Retail Salesperson'],
  ['ME','Maine',64767,'Retail Salesperson'],['MD','Maryland',90203,'Software Developer'],
  ['MA','Massachusetts',89026,'Software Developer'],['MI','Michigan',63202,'Retail Salesperson'],
  ['MN','Minnesota',80441,'Retail Salesperson'],['MS','Mississippi',48716,'Retail Salesperson'],
  ['MO','Missouri',59196,'Retail Salesperson'],['MT','Montana',60560,'Retail Salesperson'],

  ['NH','New Hampshire',84490,'Software Developer'],['NJ','New Jersey',89703,'Software Developer'],
  ['NM','New Mexico',51243,'Retail Salesperson'],['NY','New York',75157,'Retail Salesperson'],
  ['NC','North Carolina',60516,'Retail Salesperson'],['ND','North Dakota',67865,'Driver/Sales Worker'],
  ['OH','Ohio',61938,'Retail Salesperson'],['OK','Oklahoma',56071,'Retail Salesperson'],
  ['OR','Oregon',72888,'Software Developer'],['PA','Pennsylvania',67587,'Retail Salesperson'],
  ['RI','Rhode Island',74114,'Retail Salesperson'],['SC','South Carolina',58234,'Retail Salesperson'],
  ['SD','South Dakota',62985,'Retail Salesperson'],['TN','Tennessee',58516,'Retail Salesperson'],
  ['TX','Texas',67321,'Retail Salesperson'],['UT','Utah',79133,'Software Developer'],
  ['VT','Vermont',67674,'Retail Salesperson'],['VA','Virginia',80963,'Software Developer'],

  ['WI','Wisconsin',67080,'Retail Salesperson'],['WY','Wyoming',64049,'Driver/Sales Worker']
];

const abbr  = states.map(d => d[0]);
const names = states.map(d => d[1]);
const income= states.map(d => d[2]);
const jobs  = states.map(d => d[3]);
const text  = states.map(d =>
  `<b>${d[1]}</b><br>Median Income: $${d[2].toLocaleString()}<br>Top Job: ${d[3]}`
);

Plotly.newPlot('map', [{
  type: 'choropleth',
  locationmode: 'USA-states',
  locations: abbr,
  z: income,
  text: text,
  hovertemplate: '%{text}<extra></extra>',
  colorscale: [
    [0,'#1e3a5f'],[0.25,'#2563eb'],[0.5,'#38bdf8'],
    [0.75,'#86efac'],[1,'#22c55e']
  ],
  colorbar: {
    title: { text: 'Median Income ($)', font: { size: 13 } },
    tickprefix: '$', thickness: 18, len: 0.75
  },
  zmin: 47000, zmax: 92000
}], {
  geo: {
    scope: 'usa',
    showlakes: true, lakecolor: '#e0f2fe',
    bgcolor: '#f0f4f8',
    landcolor: '#e2e8f0'
  },
  margin: { t: 10, b: 10, l: 0, r: 0 },
  paper_bgcolor: '#fff',
  font: { family: 'Segoe UI, Arial, sans-serif' }
}, { responsive: true, displayModeBar: false });
